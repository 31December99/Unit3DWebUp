server {
    listen 80;

    # Root della Flutter Web app
    root /usr/share/nginx/html;
    index index.html;

    # Serve Flutter Web
    location / {
        try_files $uri /index.html;
    }

    # Proxy per il backend FastAPI
    location /api/ {
        # Usa il nome del servizio Docker Compose 'backend'
        proxy_pass http://backend:8000/;

        # Headers utili per passare info del client
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Timeout più generoso se le API sono lente
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        send_timeout 60s;
    }

    # Gestione errori (opzionale)
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
